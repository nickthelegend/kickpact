[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
# Ethereum Sepolia (chainId 11155111) — gas in ETH, stakes in mock USD₮ ERC-20
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
# Stable testnet (chainId 2201) — kept for reference; USD₮ is native gas there
stable_testnet = "https://rpc.testnet.stable.xyz"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
