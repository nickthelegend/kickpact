<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flicky Watch Party</title>
    <style>
      :root {
        --frame: #1b2548;
        --deep: #10162e;
        --panel: rgba(0, 0, 0, 0.3);
        --border: rgba(0, 0, 0, 0.55);
        --eth: #627eea;
        --gold: #e8b84b;
        --green: #3ba34b;
        --white45: rgba(255, 255, 255, 0.45);
        --white70: rgba(255, 255, 255, 0.7);
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        background: var(--frame);
        color: #fff;
        font-family: "Courier New", monospace;
        font-weight: 700;
        padding: 16px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
        -webkit-app-region: no-drag;
      }
      h1 { font-size: 15px; letter-spacing: 3px; text-transform: uppercase; }
      h1 span { color: var(--gold); }
      .sub { color: var(--white45); font-size: 10px; line-height: 1.5; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .row { display: flex; gap: 8px; }
      input {
        flex: 1;
        background: var(--deep);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        color: #fff;
        font: inherit;
        font-size: 12px;
        padding: 10px 12px;
        outline: none;
      }
      button {
        background: var(--eth);
        border: 0;
        border-radius: 8px;
        color: #fff;
        font: inherit;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 10px 16px;
        cursor: pointer;
      }
      button.gold { background: var(--gold); color: var(--frame); }
      #log {
        flex: 1;
        overflow-y: auto;
        background: var(--deep);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg { background: var(--panel); border-radius: 8px; padding: 8px 10px; max-width: 88%; align-self: flex-start; }
      .msg.mine { background: #2c3a63; align-self: flex-end; }
      .msg .who { font-size: 9px; color: var(--gold); letter-spacing: 1px; }
      .msg.mine .who { color: #8aa0f5; }
      .msg .txt { font-size: 12px; margin-top: 3px; word-break: break-word; }
      .sys { font-size: 9px; color: var(--white45); text-align: center; }
      .pill { font-size: 9px; letter-spacing: 1px; color: var(--white70); background: var(--panel); border-radius: 999px; padding: 5px 10px; }
      .pill.live { background: var(--green); color: #fff; }
      #joinView, #roomView { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    </style>
  </head>
  <body>
    <h1>flicky <span>watch party</span></h1>
    <div class="sub">
      P2P match rooms over Hyperswarm — same rooms as the Flicky mobile app.
      no server, fans connect directly.
    </div>

    <div id="joinView">
      <div class="panel">
        <div class="sub" style="margin-bottom: 8px">enter the match id from the Flicky app (game page)</div>
        <div class="row">
          <input id="gameId" placeholder="match id · e.g. 760415" />
        </div>
        <div class="row" style="margin-top: 8px">
          <input id="nick" placeholder="your name · e.g. couch-fan" />
          <button class="gold" id="joinBtn">⚡ join room</button>
        </div>
      </div>
    </div>

    <div id="roomView" style="display: none">
      <div class="row" style="align-items: center; justify-content: space-between">
        <span class="pill" id="roomLabel">room</span>
        <span class="pill" id="peers">● 0 peers</span>
      </div>
      <div id="log"><div class="sys">waiting for fans on the DHT…</div></div>
      <div class="row">
        <input id="text" placeholder="cheer…" />
        <button id="sendBtn">send</button>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
