  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // faint deterministic dot-field on the open left area (seeded LCG — no Math.random)
      const df = document.getElementById("dotfield");
      if (df && !df.dataset.built) {
        df.dataset.built = "1";
        let seed = 20260708;
        const rnd = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
        for (let i = 0; i < 46; i++) {
          const d = document.createElement("div");
          d.className = "op-dot dp";
          d.style.left = (80 + rnd() * 820).toFixed(1) + "px";
          d.style.top = (140 + rnd() * 700).toFixed(1) + "px";
          d.style.opacity = "0";
          df.appendChild(d);
        }
      }

      // furniture settles
      tl.fromTo(".grid", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power2.out" }, 0);
      tl.fromTo(".hairline", { scaleX: 0, transformOrigin: "50% 50%" }, { scaleX: 1, duration: 0.8, ease: "power2.out" }, 0.15);
      tl.fromTo(".micro", { opacity: 0, x: -12 }, { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 0.3);
      tl.fromTo(".dp", { opacity: 0 }, { opacity: 0.4, duration: 0.9, stagger: 0.01, ease: "power1.out" }, 0.5);

      // (0.0-2.2) device rises + settles
      tl.fromTo("#phone", { opacity: 0, y: 96 }, { opacity: 1, y: 0, duration: 1.1, ease: "power3.out" }, 0);

      // TESTNET row, balance card, action row stagger in
      tl.fromTo("#pillrow", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 0.5);
      tl.fromTo("#balcard", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.7);
      tl.fromTo("#actionrow .action", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.08, ease: "power2.out" }, 1.0);

      // (2.0-3.4) leader lines draw + labels connect
      tl.fromTo("#leader1", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.out" }, 2.0);
      tl.fromTo("#klabel1", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.55, ease: "power2.out" }, 2.05);
      tl.fromTo("#leader2", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.out" }, 2.6);
      tl.fromTo("#klabel2", { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.55, ease: "power2.out" }, 2.65);

      // (3.4-4.8) match cards slide up inside the phone
      tl.fromTo("#mc1", { opacity: 0, y: 44 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 3.4);
      tl.fromTo("#mc2", { opacity: 0, y: 44 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 3.55);

      // tap ripple lands on the top card
      tl.fromTo("#ripple", { scale: 0.3, opacity: 0.7 }, { scale: 1.9, opacity: 0, duration: 0.7, ease: "power2.out" }, 3.9);

      // top card accent border pulse (fromTo, no repeat/yoyo)
      tl.fromTo(
        "#mc1",
        { borderColor: "rgba(255,255,255,0.07)", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.05)" },
        { borderColor: "#627eea", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.05), 0 0 28px rgba(98,126,234,0.55)", duration: 0.32, ease: "power2.out" },
        3.95
      );
      tl.to(
        "#mc1",
        { borderColor: "rgba(255,255,255,0.07)", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.05)", duration: 0.5, ease: "power2.inOut" },
        4.3
      );

      window.__timelines["04-home"] = tl;
    })();
