      const tl = gsap.timeline({ paused: true });

      // faint deterministic dot-field (seeded LCG — no Math.random)
      const df = document.getElementById("dotfield");
      if (df && !df.dataset.built) {
        df.dataset.built = "1";
        let seed = 20260708;
        const rnd = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
        for (let i = 0; i < 64; i++) {
          const d = document.createElement("div");
          d.className = "op-dot dp";
          d.style.left = (60 + rnd() * 1800).toFixed(1) + "px";
          d.style.top = (110 + rnd() * 740).toFixed(1) + "px";
          d.style.opacity = "0";
          df.appendChild(d);
        }
      }

      // ── PHASE 1 (0.0–3.0): vault + coins deposit ──
      tl.fromTo("#vault", { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7, ease: "power3.out" }, 0.1);

      // FRIEND coin — slide in from RIGHT, then drop into vault

      tl.fromTo("#coinFriend", { y: 0, opacity: 1 }, { y: 180, opacity: 0, duration: 0.55, ease: "power2.in" }, 2.25);

      // ── PHASE 2 (3.0–5.0): lock snap + shake, pot forms, middleman crossed out ──

      tl.fromTo(".lbody", { scale: 1.12 }, { scale: 1, duration: 0.35, ease: "power3.out" }, 3.2);
      tl.to("#lock", { keyframes: { x: [0, -7, 6, -4, 3, 0] }, duration: 0.42, ease: "power1.out" }, 3.2);
      tl.fromTo("#lockglow", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 3.3);

      tl.fromTo("#pot", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 3.8);
      tl.fromTo("#escrowMicro", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 4.1);

      // middleman fades in faint, then a strike-line crosses it out and holds

      tl.fromTo("#mmStrike", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.inOut" }, 4.45);

      // ── PHASE 3 (5.0–8.0): result card flips in, green ✓ pops ──
      tl.fromTo("#result", { rotationX: -90, y: -26, opacity: 0, transformPerspective: 800 }, { rotationX: 0, y: 0, opacity: 1, transformPerspective: 800, duration: 0.6, ease: "power3.out" }, 5.1);
      tl.fromTo("#check", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power4.out" }, 6.4);

      // ── PHASE 4 (8.0–10.1): pot flies an arc to the winner, stamps land ──
      tl.fromTo("#payout", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.3, ease: "power2.out" }, 8.0);
      tl.fromTo("#payout", { x: 0, y: 0 }, { x: -265, y: -260, duration: 0.55, ease: "power1.out" }, 8.15);
      tl.fromTo("#payout", { x: -265, y: -260 }, { x: -530, y: -185, duration: 0.55, ease: "power1.in" }, 8.7);

      tl.fromTo("#winnerAccent", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power2.out" }, 8.5);
      tl.fromTo("#winnerFlash", { scale: 0.4, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.35, ease: "power3.out" }, 8.95);

      tl.fromTo("#stamp", { scale: 1.35, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "power4.out" }, 9.1);
      tl.fromTo("#tag", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 9.55);
