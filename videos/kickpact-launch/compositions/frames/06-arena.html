  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // deterministic comma formatter (no toLocaleString locale drift)
      const fmt = (n) => {
        const s = Math.round(n).toString();
        return "$" + s.slice(0, -3) + "," + s.slice(-3);
      };

      const pxval = document.getElementById("pxval");
      const pxpct = document.getElementById("pxpct");

      // grid + glow settle in
      tl.fromTo(".grid", { opacity: 0 }, { opacity: 1, duration: 0.7, ease: "power2.out" }, 0);
      tl.fromTo("#trail", { opacity: 0 }, { opacity: 0.9, duration: 0.55, ease: "power2.out" }, 2.9);

      // (0.0-2.4s) the solo card fades / rises in
      tl.fromTo("#card", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.2);

      // the live price COUNTS UP $64,032 -> $64,180 (seek-safe proxy + onUpdate)
      const px = { v: 64032 };
      tl.to(px, {
        v: 64180,
        duration: 1.4,
        ease: "power1.out",
        onUpdate: () => { pxval.textContent = fmt(px.v); },
      }, 0.6);
      // ... and turns green
      tl.fromTo(pxval, { color: "#eaeeff" }, { color: "#3ba34b", duration: 0.6, ease: "power1.inOut" }, 1.4);
      // (+0.23%) delta pops in green
      tl.fromTo(pxpct, { opacity: 0, x: -8 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" }, 1.9);

      // (2.4-4.0s) cursor arrives + presses the UP button
      tl.fromTo("#cursor", { opacity: 0, y: -22 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 2.4);
      // button press: scale down then back up (no yoyo — two seek-safe tweens)
      tl.to("#btnUp", { scale: 0.9, duration: 0.12, ease: "power2.in", transformOrigin: "50% 50%" }, 2.9);
      tl.to("#cursor", { y: 12, duration: 0.12, ease: "power2.in" }, 2.9);
      tl.to("#btnUp", { scale: 1, duration: 0.2, ease: "power2.out", transformOrigin: "50% 50%" }, 3.02);
      tl.to("#cursor", { y: 0, duration: 0.2, ease: "power2.out" }, 3.02);

      // ... the whole card tilts + lifts up (the swipe)
      tl.fromTo(
        "#cardwrap",
        { y: 0, rotation: 0 },
        { y: -66, rotation: -6, duration: 0.9, ease: "power3.out" },
        3.0
      );

      // recede the card's price + buttons so the stamp reads cleanly
      tl.to(["#pxval", "#pxpct", ".pbtn"], { opacity: 0.16, duration: 0.35, ease: "power1.out" }, 3.95);

        { opacity: 0, scale: 1.8 },
        { opacity: 1, scale: 1, duration: 0.5, ease: "power4.out" },

      window.__timelines["06-arena"] = tl;
