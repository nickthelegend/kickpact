  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // build the faint opinion dot-field deterministically (no Math.random)
      const df = document.getElementById("dotfield");
      if (df && !df.dataset.built) {
        df.dataset.built = "1";
        let seed = 20260707;
        const rnd = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
        for (let i = 0; i < 90; i++) {
          const d = document.createElement("div");
          d.className = "op-dot dp";
          d.style.left = (60 + rnd() * 1800).toFixed(1) + "px";
          d.style.top = (120 + rnd() * 780).toFixed(1) + "px";
          d.style.opacity = "0";
          df.appendChild(d);
        }
      }

      tl.fromTo(".grid", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power2.out" }, 0);
      tl.fromTo("#cline", { scaleY: 0, opacity: 0.2 }, { scaleY: 1, opacity: 1, duration: 1.0, ease: "power3.out" }, 0.1);
      tl.fromTo(".hairline", { scaleX: 0, transformOrigin: "50% 50%" }, { scaleX: 1, duration: 0.8, ease: "power2.out" }, 0.2);
      tl.fromTo("#micro", { opacity: 0, x: -12 }, { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 0.3);

      // 90:00 count-in (seek-safe via onUpdate on a tweened proxy)
      const clock = document.getElementById("clock");
      const proxy = { v: 0 };
      tl.fromTo(clock, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.5);
      tl.to(proxy, {
        v: 90,
        duration: 1.0,
        ease: "power1.out",
        onUpdate: () => { clock.textContent = Math.round(proxy.v).toString().padStart(2, "0") + ":00"; },
      }, 0.5);
      tl.fromTo("#clockrule", { scaleX: 0 }, { scaleX: 1, duration: 0.7, ease: "power2.out" }, 1.2);

      tl.fromTo("#l1", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.6);
      tl.fromTo("#l2a", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 2.0);
