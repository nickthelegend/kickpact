  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // deterministic converging cell field behind the wordmark (no Math.random)
      const cf = document.getElementById("cellfield");
      if (cf && !cf.dataset.built) {
        cf.dataset.built = "1";
        let seed = 20260708;
        const rnd = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
        for (let i = 0; i < 44; i++) {
          const c = document.createElement("div");
          c.className = "gcell gc";
          // scattered around the wordmark band, biased toward centre
          c.style.left = (640 + rnd() * 640).toFixed(1) + "px";
          c.style.top = (250 + rnd() * 210).toFixed(1) + "px";
          c.style.opacity = "0";
          cf.appendChild(c);
        }
      }

      // grid brightens + re-aligns toward centre; accent glow floods back in
      tl.fromTo("#grid", { opacity: 0.4, scale: 1.06 }, { opacity: 1, scale: 1, duration: 1.2, ease: "power3.out" }, 0);
      tl.fromTo("#gridglow", { opacity: 0 }, { opacity: 1, duration: 1.1, ease: "power2.out" }, 0.1);

      // cells converge, then dissolve as the letters take their place
      tl.fromTo(".gc", { opacity: 0, scale: 0.4 }, { opacity: 0.7, scale: 1, duration: 0.5, stagger: 0.02, ease: "power2.out" }, 0.15);
      tl.to(".gc", { opacity: 0, scale: 0.4, duration: 0.5, stagger: 0.02, ease: "power2.in" }, 0.9);

      // KICKPACT assembles from the grid — per-letter stagger rising into place
      tl.fromTo(
        "#wordmark .wl",
        { opacity: 0, y: 34, scale: 0.86 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, stagger: 0.08, ease: "power3.out" },
        0.35
      );

      // accent hairline sweeps under the wordmark
      tl.fromTo("#underline", { scaleX: 0, opacity: 0.4 }, { scaleX: 1, opacity: 1, duration: 0.6, ease: "power2.out" }, 1.5);

      // two tagline lines fade + rise
      tl.fromTo("#tline1", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 2.0);
      tl.fromTo("#tline2", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 2.35);

      // badges slide up from the bottom hairline + settle
      tl.fromTo("#badgeWdk", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 4.0);
      tl.fromTo("#badgePears", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 4.18);

      window.__timelines["03-logo"] = tl;
