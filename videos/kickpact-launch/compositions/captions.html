<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  /* the keep-out band, from captionBand(H) — frame content stays above it */
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    /* every group is absolutely stacked over the SAME band — exactly one shown at a
       time via opacity. Must be absolute: in-flow groups would lay out side-by-side. */
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  /* THE cream card — graph-paper grid behind the line + top/bottom 1.5px cobalt
     hairlines (cobalt's frame furniture), square corners, NO drop shadow */
  .caption-pill {
    position: relative;
    max-width: 78%;
    padding: 20px 44px 24px;
    background: var(--cap-canvas, #f0ebde);
    background-image:
      linear-gradient(
        to right,
        color-mix(in srgb, var(--cap-ink, #1f2be0) 10%, transparent) 1px,
        transparent 1px
      ),
      linear-gradient(
        to bottom,
        color-mix(in srgb, var(--cap-ink, #1f2be0) 10%, transparent) 1px,
        transparent 1px
      );
    background-size: 16px 16px;
    border-top: 1.5px solid var(--cap-ink, #1f2be0);
    border-bottom: 1.5px solid var(--cap-ink, #1f2be0);
    border-radius: 0;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.1em 0.34em;
    font-family: "KickpactPixel", Georgia, serif;
    font-weight: 400;
    font-size: clamp(40px, 4.4vw, 58px);
    line-height: 1.16;
    letter-spacing: -0.01em;
  }

  /* upcoming — faint cobalt, no block */
  .caption-word {
    display: inline-block;
    padding: 0 0.06em;
    color: color-mix(in srgb, var(--cap-ink, #1f2be0) 42%, var(--cap-canvas, #f0ebde));
  }
  /* current word — THE cobalt flat block (risograph knockout): a solid cobalt fill
     via box-shadow spread = a hard square block w/o layout shift, no blur; the cream
     paper reads on top */
  .caption-word.is-active {
    color: var(--cap-canvas, #f0ebde);
    background: var(--cap-ink, #1f2be0);
    box-shadow: 0 0 0 0.06em var(--cap-ink, #1f2be0);
  }
  /* already spoken — solid cobalt ink, block cleared */
  .caption-word.is-spoken {
    color: var(--cap-ink, #1f2be0);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  /* brand / key term — Newsreader italic, cobalt's only display inflection */
  .caption-word.cap-brand {
    font-style: italic;
  }
  /* numerals / data — the body sans voice, slightly recessed */
  .caption-word.cap-num {
    font-family: "KickpactPixel", ui-monospace, monospace;
    color: color-mix(in srgb, var(--cap-ink, #1f2be0) 72%, var(--cap-canvas, #f0ebde));
  }
  /* emphasis — a cobalt hairline underline (no second hue; emphasis is the ink) */
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--cap-accent, #5560e5);
    text-underline-offset: 0.1em;
  }

    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(34px, 5.4vw, 48px);
    }
  }
