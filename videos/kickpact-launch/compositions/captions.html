<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  /* the keep-out band, from captionBand(H) — frame content stays above it */
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    /* every group is absolutely stacked over the SAME band — exactly one shown at a
       time via opacity. Must be absolute: in-flow groups would lay out side-by-side. */
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  /* THE cream card — graph-paper grid behind the line + top/bottom 1.5px cobalt
     hairlines (cobalt's frame furniture), square corners, NO drop shadow */
  .caption-pill {
    position: relative;
    max-width: 78%;
    padding: 20px 44px 24px;
    background: var(--cap-canvas, #f0ebde);
    background-image:
      linear-gradient(
        to right,
        color-mix(in srgb, var(--cap-ink, #1f2be0) 10%, transparent) 1px,
        transparent 1px
      ),
      linear-gradient(
        to bottom,
        color-mix(in srgb, var(--cap-ink, #1f2be0) 10%, transparent) 1px,
        transparent 1px
      );
    background-size: 16px 16px;
    border-top: 1.5px solid var(--cap-ink, #1f2be0);
    border-bottom: 1.5px solid var(--cap-ink, #1f2be0);
    border-radius: 0;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.1em 0.34em;
    font-family: "KickpactPixel", Georgia, serif;
    font-weight: 400;
    font-size: clamp(40px, 4.4vw, 58px);
    line-height: 1.16;
    letter-spacing: -0.01em;
  }

  /* upcoming — faint cobalt, no block */
  .caption-word {
    display: inline-block;
    padding: 0 0.06em;
    color: color-mix(in srgb, var(--cap-ink, #1f2be0) 42%, var(--cap-canvas, #f0ebde));
  }
  /* current word — THE cobalt flat block (risograph knockout): a solid cobalt fill
     via box-shadow spread = a hard square block w/o layout shift, no blur; the cream
     paper reads on top */
  .caption-word.is-active {
    color: var(--cap-canvas, #f0ebde);
    background: var(--cap-ink, #1f2be0);
    box-shadow: 0 0 0 0.06em var(--cap-ink, #1f2be0);
  }
  /* already spoken — solid cobalt ink, block cleared */
  .caption-word.is-spoken {
    color: var(--cap-ink, #1f2be0);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  /* brand / key term — Newsreader italic, cobalt's only display inflection */
  .caption-word.cap-brand {
    font-style: italic;
  }
  /* numerals / data — the body sans voice, slightly recessed */
  .caption-word.cap-num {
    font-family: "KickpactPixel", ui-monospace, monospace;
    color: color-mix(in srgb, var(--cap-ink, #1f2be0) 72%, var(--cap-canvas, #f0ebde));
  }
  /* emphasis — a cobalt hairline underline (no second hue; emphasis is the ink) */
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--cap-accent, #5560e5);
    text-underline-offset: 0.1em;
  }

  @media (max-aspect-ratio: 9/16) {
    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(34px, 5.4vw, 48px);
    }
  }

      words.forEach(function (w, i) {
        var el = document.getElementById("caption-word-" + g + "-" + i);
        var at = Math.max(start, Number(w.start));
        tl.set(el, { className: "caption-word" }, start); // upcoming (also resets on reverse-seek)
        tl.set(el, { className: "caption-word is-active" }, at); // current
        tl.fromTo(el, { scale: 0.985 }, { scale: 1, duration: 0.1, ease: "power3.out" }, at);
        if (i + 1 < words.length) {
          var nextAt = Math.max(start, Number(words[i + 1].start));
          tl.set(el, { className: "caption-word is-spoken" }, nextAt); // demote when next activates
        }
      });
      if (words.length) {
        var lastEl = document.getElementById("caption-word-" + g + "-" + (words.length - 1));
        var lastSpoken = Math.min(end, Number(words[words.length - 1].end) + 0.1);
        tl.set(lastEl, { className: "caption-word is-spoken" }, lastSpoken);
      }
    });

    // full-span anchor so the sub-comp timeline spans the whole video
    tl.to({}, { duration: DURATION }, 0);
    window.__timelines["captions"] = tl;
  })();
</script>

<style>
  .caption-line { line-height: 1.1 !important; }
</style>
<style>
  .caption-word { color: color-mix(in srgb, var(--cap-ink) 64%, var(--cap-canvas)); }
  .caption-word.is-active { color: var(--cap-ink); background: var(--cap-accent); box-shadow: 0 0 0 0.06em var(--cap-accent); }
  .caption-word.is-spoken { color: var(--cap-ink); background: transparent; box-shadow: none; }
</style>
</template>
